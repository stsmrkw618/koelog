<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8941A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="230" r="100" fill="#F5A623" opacity="0.08"/>
  <!-- Mic body -->
  <rect x="224" y="150" width="64" height="120" rx="32" fill="url(#amber)" filter="url(#glow)"/>
  <!-- Mic arc -->
  <path d="M192 260 Q192 320 256 320 Q320 320 320 260" fill="none" stroke="url(#amber)" stroke-width="10" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="256" y1="320" x2="256" y2="360" stroke="url(#amber)" stroke-width="10" stroke-linecap="round"/>
  <line x1="226" y1="360" x2="286" y2="360" stroke="url(#amber)" stroke-width="10" stroke-linecap="round"/>
</svg>
